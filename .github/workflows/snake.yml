name: Generate Snake Animation

on:
  # Run this workflow automatically on a schedule
  schedule:
    - cron: '0 6 * * *' # Runs every day at 6 AM UTC

  # Allow manual runs from the Actions tab
  workflow_dispatch:


permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          # Your GitHub username
          github_user_name: ${{ github.repository_owner }}

          # The output SVG file path
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#ffffff&color_dots=#cbd5e1,#94a3b8,#64748b,#3b82f6,#2563eb
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ffffff&color_dots=#1e293b,#334155,#475569,#3b82f6,#60a5fa

      - name: Push to repo
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist
            git commit -m "Generate Contribution Snake" || exit 0
            git pull
            git push